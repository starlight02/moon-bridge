mode: "Transform" # Transform / CaptureAnthropic / CaptureResponse

log:
  level: "info"  # debug / info / warn / error
  format: "text" # text / json

# 桥接层注入的系统提示词，会追加到 Anthropic system 字段末尾。
# 用于向非 Codex 训练的模型传递项目特定指令（如沙箱权限提升指南）。
# system_prompt: ""

server:
  addr: "127.0.0.1:38440"

trace_requests: false

provider:
  base_url: "https://provider.example.com"
  api_key: "replace-with-provider-api-key"
  version: "2023-06-01"
  user_agent: "claude-cli/2.1.112 (external, cli)"
  web_search:
    support: "auto" # auto / enabled / disabled
    max_uses: 8
  default_max_tokens: 1024
  default_model: "moonbridge"
  # deepseek_v4: true  # Enable DeepSeek V4 thinking_mode extension
  #                     Strips reasoning_content from input, extracts it from output,
  #                     and drops unsupported params (temperature, top_p).
  models:
    moonbridge:
      name: "provider-model-name"
      context_window: 200000
      max_output_tokens: 100000

cache:
  mode: "explicit"  # off / automatic / explicit / hybrid
  ttl: "5m"         # 5m / 1h
  prompt_caching: true
  automatic_prompt_cache: false    # top-level request cache_control; enable only when the provider supports it well
  explicit_cache_breakpoints: true  # block-level cache_control on tools/system/messages, matching Claude Code captures
  allow_retention_downgrade: false
  max_breakpoints: 4
  min_cache_tokens: 1024
  expected_reuse: 2
  minimum_value_score: 2048

developer:
  proxy:
    response:
      model: "gpt-5.4"
      provider:
        base_url: "https://api.openai.com"
        api_key: "replace-with-real-openai-compatible-api-key"
    anthropic:
      model: "" # optional; leave empty to use Claude Code settings/default model
      provider:
        base_url: "https://provider.example.com"
        api_key: "replace-with-real-anthropic-compatible-api-key"
        version: "2023-06-01"
